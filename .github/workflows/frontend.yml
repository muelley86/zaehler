name: frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

# Least Privilege: dieser Workflow checkt nur aus + testet, braucht keinen
# Schreib-Token. Ohne diesen Block erbt der Job den (oft weiteren)
# Repo-Default-Scope.
permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Kein Schreib-Token nötig; verhindert, dass der GITHUB_TOKEN nach
          # dem Checkout in .git/config persistiert (zizmor: artipacked).
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Node 24 (Active LTS seit 10/2025) — passt zu engines.node >=24.
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier
        run: pnpm format:check

      - name: TypeScript
        run: pnpm type-check

      - name: Vitest
        run: pnpm test:run

      - name: Build
        run: pnpm build
