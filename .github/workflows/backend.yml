name: backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

# Least Privilege: dieser Workflow checkt nur aus + testet, braucht keinen
# Schreib-Token. Ohne diesen Block erbt der Job den (oft weiteren)
# Repo-Default-Scope.
permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

      # SPA-Fallback-Tests in test_spa_fallback.py setzen voraus, dass
      # backend/src/meters/static/index.html existiert. Das Verzeichnis ist
      # gitignored — CI muss das Frontend selber bauen, sonst 5 rote Tests.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend-Deps + Build (fuer SPA-Fallback-Tests)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Pytest
        run: uv run pytest
